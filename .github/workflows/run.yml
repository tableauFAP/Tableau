name: Fetch INSEE

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

      - run: pip install requests pandas

      - name: Run script
        env:
          INSEE_CLIENT_ID: ${{ secrets.INSEE_CLIENT_ID }}
          INSEE_CLIENT_SECRET: ${{ secrets.INSEE_CLIENT_SECRET }}
        run: python fetch.py

      - name: Commit CSV
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@mail.com"
          git add data.csv
          git commit -m "update data" || echo "no change"
          git push
