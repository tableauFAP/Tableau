name: Fetch Carburant

on:
  schedule:
    - cron: "0 6 * * *"  # tous les jours à 6h UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du repo
      - uses: actions/checkout@v4

      # 2️⃣ Installer Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Installer dépendances
      - run: pip install requests pandas openpyxl

      # 4️⃣ Exécuter le script Python
      - name: Run fetch script
        run: python fetch_carburant.py

      # 5️⃣ Commit + push automatique avec le token Actions
      - name: Commit CSV
        uses: ad-m/github-push-action@v0.6.0
        with:
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
